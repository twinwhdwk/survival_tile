<!DOCTYPE html>
<html lang="head" dir="ltr">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>

    <title>타일 서바이벌</title>

    <!-- Display face for titles/headlines (Black Han Sans) and body face for
         HUD/labels (Gothic A1) — see src/client/theme/Theme.js for where
         these are referenced. Both replace the previous 'Malgun Gothic'
         system-font fallback, which rendered inconsistently across OSes and
         carried no visual identity of its own. -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gothic+A1:wght@400;500;700;900&display=swap" rel="stylesheet"/>

    <link rel="stylesheet" type="text/css" href="public/css/styles.css"/>
    <!-- An inline SVG data URI needs no separate image asset/build step,
         matching the game's own no-external-assets approach to textures
         (see EffectTextures.js) -- just the same 🔥 used throughout the UI. -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%94%A5</text></svg>"/>

    <script type="text/javascript" src="public/js/bundle.js"></script>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>
